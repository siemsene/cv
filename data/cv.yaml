admin_initiatives:
  - years: 2023–2024
    description: Organization of two ‘Generative AI’ days at the Wisconsin School of Business.
  - years: 2022–2024
    description: Development and launch of online MSDIA program in partnership with edX.
  - years: 2021–2024
    description: Development and re-launch of Executive MBA program.
  - years: 2020–2021
    description: >-
      Development and launch of Technology Strategy & Product Management MBA
      Specialization, as well as coordination of new Marketing specializations in FTMBA.
  - years: 2019–2020
    description: >-
      Development and launch of Professional MBA program and badges lifelong learning
      structure. Led a team to develop the proposal. Oversaw market research and industry
      feedback. Facilitated campus negotiations and academic governance. Oversaw operational
      deployment (scheduling, admissions, marketing, technology, course development, training, hiring).
  - years: 2018–2019
    description: >-
      Oversaw development and launch of three MS programs (Business Analytics, Real Estate,
      Supply Chain). Coordinated with departments, negotiations with campus, led academic
      governance, oversaw implementation teams.
  - years: 2018–2019
    description: >-
      Participated in major budget restructuring of the School of Business. Helped to close a
      significant gap in our budget by, e.g., restructuring financial aid and cost cutting.
  - years: 2016–2018
    description: >-
      Development of PharmD/OTM Named Option. Led coordination with School of Pharmacy & campus,
      supported academic governance, negotiated memorandum of understanding and oversaw launch.
  - years: 2015–2016
    description: Introduced STEM Designation to MBA Program Specializations.
  - years: 2012–2013
    description: Participated in development of Executive MBA elective system.

